# dysonsphere theme configuration
#
# Place this file in your project root or at
# ~/.config/dysonsphere/dysonsphere.toml for user-wide defaults.
#
# Format: TOML sections, one per named style.
# Load a style with: ds.theme(style="nih")
#
# [default] is optional — omit it or leave it empty to use dysonsphere's
# built-in defaults unchanged. Add keys here only to override specific
# parameters for every ds.theme() call regardless of style.
[default]

[nih]
axisWidth = 0.5
fontSize = 6
fontWeight = 400

[notebook]
chartWidth=900
chartHeight=900
darkmode=true
fontSize=18
transparentBackground=true

[presentation]
fontSize = 12
darkmode=true
transparentBackground=true
